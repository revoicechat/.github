# .github/labels.yml

# ── Repo / Scope ──────────────────────────────────────────────────────────────
- name: "scope: core-server"
  color: "6f42c1"
  description: "Impacts ReVoiceChat-CoreServer"

- name: "scope: media-server"
  color: "0075ca"
  description: "Impacts ReVoiceChat-MediaServer"

- name: "scope: web-client"
  color: "e99695"
  description: "Impacts ReVoiceChat-WebClient"

- name: "scope: i18n"
  color: "f9d0c4"
  description: "Impacts ReVoiceChat-i18n"

- name: "scope: nginx"
  color: "bfd4f2"
  description: "Impacts nginx configuration"

- name: "scope: scripts"
  color: "fef2c0"
  description: "Impacts scripts or automation"

- name: "scope: docker"
  color: "1d76db"
  description: "Impacts docker-compose or container setup"

- name: "scope: ci"
  color: "0e8a16"
  description: "Impacts CI/CD pipelines or hooks"

# ── Type ──────────────────────────────────────────────────────────────────────
- name: "type: bug"
  color: "d73a4a"
  description: Something isn't working

- name: "type: feature"
  color: "a2eeef"
  description: New feature or request

- name: "type: enhancement"
  color: "84b6eb"
  description: Improvement to an existing feature

- name: "type: docs"
  color: "0075ca"
  description: Improvements or additions to documentation

- name: "type: refactor"
  color: "e4e669"
  description: Code change that neither fixes a bug nor adds a feature

- name: "type: test"
  color: "bfd4f2"
  description: Adding or updating tests

- name: "type: chore"
  color: "fef2c0"
  description: Maintenance tasks, dependency updates, CI changes

- name: "type: security"
  color: "ee0701"
  description: Security vulnerability or patch

# ── Priority ──────────────────────────────────────────────────────────────────
- name: "priority: critical"
  color: "b60205"
  description: Drop everything — needs immediate attention

- name: "priority: high"
  color: "e11d48"
  description: High priority, address soon

- name: "priority: medium"
  color: "f97316"
  description: Normal priority

- name: "priority: low"
  color: "fbbf24"
  description: Nice to have, address when possible

# ── Status ────────────────────────────────────────────────────────────────────
- name: "status: needs triage"
  color: "ededed"
  description: Needs review and categorization

- name: "status: in progress"
  color: "0e8a16"
  description: Actively being worked on

- name: "status: blocked"
  color: "b60205"
  description: Blocked by another issue or external dependency

- name: "status: needs review"
  color: "006b75"
  description: Awaiting code review

- name: "status: needs info"
  color: "d4c5f9"
  description: More information needed from author or reporter

- name: "status: wont fix"
  color: "ffffff"
  description: This will not be worked on

- name: "status: duplicate"
  color: "cfd3d7"
  description: This issue or PR already exists

# ── Community ─────────────────────────────────────────────────────────────────
- name: "good first issue"
  color: "7057ff"
  description: Good for newcomers

- name: "help wanted"
  color: "008672"
  description: Extra attention is needed, open to contributors
